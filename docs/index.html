<!DOCTYPE html>
<html>
    <head>
        <title> StudyByte </title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body class = "text-center">
        <h1>StudyByte</h1>
        <form id="problemForm">
            <label for="problem">Enter your study query:</label>
            <br>
            <input type="text" id="problem" name="problem" required placeholder="Example: factor x^2+2x+1" style="width: 70%">
            <button type="submit" class="btn btn-primary">Get GPT Response</button>
        </form>
        <div id = "response" class="mt-4 ms-5 me-5"></div>
        <!--Script-->
        <script src="script.js"></script>
    </body>
</html>
